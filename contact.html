    <title>Contact - Camille Belmin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #C6CDF7FF;
            min-height: 100vh;
            padding: 5vh 5vw;
            font-family: Impact, sans-serif;
        }

        .word {
            position: fixed;
            left: 15vw;
            top: 40vh;
            font-size: 48px;
            color: #D8A499FF;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        .content {
            position: fixed;
            left: 45vw;
            top: 20vh;
            max-width: 50vw;
        }

        .icon-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 20px;
            text-decoration: none;
            position: relative;
            transition: transform 0.3s ease;
        }

        .icon-link:hover {
            transform: scale(1.15);
        }

        .icon-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #8a3ab9);
            box-shadow: 0 4px 15px rgba(188, 24, 136, 0.3);
        }

        .icon-insta svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        .icon-email {
            background-color: #E6A0C4FF;
            box-shadow: 0 4px 15px rgba(230, 160, 196, 0.3);
        }

        .icon-email svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .label {
            display: block;
            font-family: Georgia, serif;
            font-size: 12px;
            color: #073763;
            margin-top: 8px;
            text-align: center;
        }

        .icon-group {
            display: flex;
            gap: 15px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .back {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            color: #D8A499FF;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 0.5s;
        }
    </style>
</head>
