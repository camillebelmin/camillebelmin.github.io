<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Camille Belmin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #C6CDF7FF;
            min-height: 100vh;
            padding: 5vh 5vw;
            font-family: Impact, sans-serif;
        }

        h1 {
            font-size: 48px;
            color: #E6A0C4FF;
            margin-bottom: 30px;
            padding-left: 20%;
        }

        .content {
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 1.7;
            color: #073763;
            max-width: 600px;
            padding-left: 20%;
        }

        .back {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            color: #D8A499FF;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Portfolio</h1>

    <div class="content">
        <p>Portfolio content coming soon...</p>
    </div>

    <a href="index.html" class="back">← back</a>
</body>
</html>
